# ──────────────────────────────────────────────────────────────
# Frontend Deploy — Vercel Auto-Deploy
# ──────────────────────────────────────────────────────────────
#
# Triggers when frontend code changes are pushed to main.
# No SSH or build needed — Vercel handles everything via deploy
# hooks (auto-builds on their servers).
#
# Architecture:
#   You push frontend changes ──▶ GitHub triggers this workflow
#                                         │
#                                         ▼
#                               ┌───────────────────┐
#                               │ Vercel Deploy Hook │
#                               │ (user frontend)    │
#                               └────────┬──────────┘
#                                        ▼
#                               ┌───────────────────┐
#                               │ Vercel Deploy Hook │
#                               │ (admin frontend)   │
#                               └────────┬──────────┘
#                                        ▼
#                               ┌───────────────────┐
#                               │ Telegram            │
#                               │ Notification        │
#                               └───────────────────┘
#
# Setup:
#   1. In Vercel dashboard, create Deploy Hooks for each frontend
#   2. Add them as GitHub Secrets:
#      - VERCEL_USER_DEPLOY_HOOK
#      - VERCEL_ADMIN_DEPLOY_HOOK
#   3. Set TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID for notifications
# ──────────────────────────────────────────────────────────────

name: Frontend Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'frontend-user/**'
      - 'frontend-admin/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
        type: choice
        options:
          - main
          - hotfix/*

concurrency:
  group: production-frontend
  cancel-in-progress: true

jobs:
  # ──── JOB: Deploy Frontends to Vercel ──────────────────────
  deploy-frontends:
    name: Deploy Frontends to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      deployment_started: ${{ steps.start.outputs.deployment_started }}

    steps:
      - name: Start Deployment
        id: start
        run: |
          echo "🚀 Starting frontend deployment at $(date)..."
          echo "deployment_started=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "✅ Branch: ${{ github.ref_name }}"
          echo "✅ Commit: ${{ github.sha }}"

      - name: Trigger Vercel User Frontend Deploy
        run: |
          echo "🚀 Triggering Vercel deploy for User Frontend..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.VERCEL_USER_DEPLOY_HOOK }}")
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "✅ User frontend deploy triggered (HTTP $HTTP_CODE)"
          else
            echo "⚠️ User frontend deploy returned HTTP $HTTP_CODE (may still work)"
          fi

      - name: Trigger Vercel Admin Frontend Deploy
        run: |
          echo "🚀 Triggering Vercel deploy for Admin Frontend..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.VERCEL_ADMIN_DEPLOY_HOOK }}")
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "✅ Admin frontend deploy triggered (HTTP $HTTP_CODE)"
          else
            echo "⚠️ Admin frontend deploy returned HTTP $HTTP_CODE (may still work)"
          fi

      - name: Deployment Summary
        run: |
          echo "## Frontend Deployments" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| User     | ✅ Deploy hook sent |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin    | ✅ Deploy hook sent |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Vercel deployment progress: https://vercel.com/dashboard" >> $GITHUB_STEP_SUMMARY

  # ──── JOB: Telegram Notification ──────────────────────────
  notify:
    name: Send Telegram Notification
    runs-on: ubuntu-latest
    needs: [deploy-frontends]
    if: always()

    steps:
      - name: Send Telegram Message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ── *Bakong E-commerce — Frontend Deployment* ──

            *Repository:* ${{ github.repository }}
            *Branch:* ${{ github.ref_name }}
            *Commit:* `${{ github.sha }}`
            *Author:* ${{ github.actor }}
            *Time:* ${{ needs.deploy-frontends.outputs.deployment_started }}

            *User Frontend:* ✅ **Triggered**
            *Admin Frontend:* ✅ **Triggered**

            🔗 https://vercel.com/dashboard
