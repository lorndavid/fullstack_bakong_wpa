# yaml
name: Test SSH Connection

on:
  workflow_dispatch: # Manual trigger only

jobs:
  test-ssh:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Check SSH Connectivity
        run: |
          PORT="${{ secrets.SERVER_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi

          echo "🔌 Testing connectivity to ${{ secrets.SERVER_HOST }} on port $PORT..."

          if nc -z -w 10 "${{ secrets.SERVER_HOST }}" "$PORT" 2>/dev/null; then
            echo "✅ Server is reachable on port $PORT"
          else
            echo "❌ Cannot reach ${{ secrets.SERVER_HOST }} on port $PORT"
            echo ""
            echo "Run these commands ON your VM:"
            echo "  1. sudo systemctl status ssh"
            echo "  2. sudo ufw status"
            echo "  3. sudo ufw allow 22/tcp"
            echo "  4. curl -s ifconfig.me"
            exit 1
          fi

      - name: Add Server to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>&1 || echo "⚠️ ssh-keyscan failed (non-fatal)"

      - name: Test SSH Connection
        run: |
          echo "🔌 Testing SSH to ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}..."

          PORT_FLAG=""
          if [ -n "${{ secrets.SERVER_PORT }}" ]; then
            PORT_FLAG="-p ${{ secrets.SERVER_PORT }}"
          fi

          ssh -o StrictHostKeyChecking=no \
              $PORT_FLAG \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "echo '✅ SSH OK'; hostname; uptime; pm2 list 2>/dev/null || echo 'No PM2'"
