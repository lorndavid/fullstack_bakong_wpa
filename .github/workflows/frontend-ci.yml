# ──────────────────────────────────────────────────────────────
# Frontend CI — Continuous Integration
# ──────────────────────────────────────────────────────────────
# Triggers:
#   - push to any feature/*, hotfix/*, release/* branch
#   - pull_request targeting main
#
# What it does:
#   1. Install dependencies (cached)
#   2. TypeScript type-check (vue-tsc)
#   3. ESLint + Vue plugin static analysis
#   4. Run unit tests (Vitest)
#   5. Run npm audit
#   6. Build with Vite (production bundle)
#
# Why two frontends in one workflow:
#   - Both use the same stack (Vue 3 + Vite + TypeScript)
#   - Running them in parallel saves ~50% total CI time
#   - Single workflow file is easier to maintain than two
# ──────────────────────────────────────────────────────────────

name: Frontend CI

on:
  push:
    branches:
      - 'feature/**'
      - 'hotfix/**'
      - 'release/**'
    paths:
      - 'frontend-user/**'
      - 'frontend-admin/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches:
      - main
      - release/**
    paths:
      - 'frontend-user/**'
      - 'frontend-admin/**'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-frontend
  cancel-in-progress: true

jobs:
  # ──── JOB: User Frontend ──────────────────────────────────
  user-frontend:
    name: User Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-user

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend-user/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Check
        run: npm run typecheck
        # Uses vue-tsc --noEmit — checks .vue SFCs + TypeScript

      - name: ESLint
        run: npm run lint

      - name: Run Tests
        run: npm test -- --coverage
        continue-on-error: true
        # Vitest with --coverage. Continue if no tests exist yet.

      - name: Security Audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: npm run build
        # vue-tsc -b && vite build -> dist/ folder

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: frontend-user-dist
          path: frontend-user/dist/
          retention-days: 7
        # Only save artifacts from main for potential rollback

  # ──── JOB: Admin Frontend ─────────────────────────────────
  admin-frontend:
    name: Admin Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-admin

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend-admin/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Run Tests
        run: npm test -- --coverage
        continue-on-error: true

      - name: Security Audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: frontend-admin-dist
          path: frontend-admin/dist/
          retention-days: 7

  # ──── JOB: Deployment Summary ─────────────────────────────
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [user-frontend, admin-frontend]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## Frontend CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| User     | ${{ needs.user-frontend.result == 'success' && '✅ Pass' || needs.user-frontend.result == 'failure' && '❌ Fail' || '⚠️ Skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin    | ${{ needs.admin-frontend.result == 'success' && '✅ Pass' || needs.admin-frontend.result == 'failure' && '❌ Fail' || '⚠️ Skipped' }} |" >> $GITHUB_STEP_SUMMARY
