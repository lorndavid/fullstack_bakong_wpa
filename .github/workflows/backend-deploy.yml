# ──────────────────────────────────────────────────────────────
# Backend Deploy — Continuous Deployment
# ──────────────────────────────────────────────────────────────
# 
# Architecture:
#   You push to main ──▶ GitHub triggers this workflow
#                              │
#                              ▼
#                    ┌──────────────────┐
#                    │  Self-Hosted      │
#                    │  Runner           │  (runs ON your Debian VM)
#                    │  (runs-on: self-  │
#                    │   hosted)         │
#                    └────────┬─────────┘
#                             │
#                    ┌────────▼─────────┐
#                    │  deploy.sh        │
#                    │  (zero-downtime)  │
#                    └────────┬─────────┘
#                             │
#                    ┌────────▼─────────┐
#                    │  PM2 reload       │
#                    │  + health check   │
#                    └────────┬─────────┘
#                             │
#              ┌──────────────┴──────────────┐
#              ▼                              ▼
#     ┌─────────────────┐          ┌──────────────────┐
#     │ Vercel Deploy    │          │ Telegram          │
#     │ (user + admin)   │          │ Notification      │
#     └─────────────────┘          └──────────────────┘
#
# Why self-hosted runner?
#   - Your VM is behind a home router firewall (no public SSH)
#   - The runner runs directly ON your VM — no SSH needed
#   - More secure (no open ports to the internet)
#   - Faster (no network latency for SSH commands)
#
# Setup:
#   1. Go to GitHub → Settings → Actions → Runners → Add runner
#   2. Follow the Linux instructions to install on your Debian VM
#   3. Make sure the runner service is running (svc.sh start)
# ──────────────────────────────────────────────────────────────

name: Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
        type: choice
        options:
          - main
          - hotfix/*
      skip_ci:
        description: 'Skip CI checks (emergency only)'
        required: false
        default: false
        type: boolean

concurrency:
  group: production-backend
  cancel-in-progress: true

jobs:
  # ──── JOB: Deploy Backend (Self-Hosted Runner) ────────────
  deploy:
    name: Deploy Backend to Production
    runs-on: self-hosted     # ← Runs directly on your Debian VM!
    timeout-minutes: 15

    # ── Declare job outputs for cross-job access ────────────
    outputs:
      deployment_started: ${{ steps.deploy.outputs.deployment_started }}
      deployment_status: ${{ steps.deploy.outputs.deployment_status }}

    environment:
      name: production
      url: https://api.lorndavid.online

    # ── Default working directory ──────────────────────────
    # The repo already exists on the VM at $HOME/fullstack_bakong_wpa
    # We do NOT use actions/checkout because that would DELETE
    # node_modules, releases/, .env, and other untracked files!
    defaults:
      run:
        working-directory: /home/david/fullstack_bakong_wpa
    # Override GITHUB_WORKSPACE to match our working directory
    env:
      GITHUB_WORKSPACE: /home/david/fullstack_bakong_wpa

    steps:
      - name: Start Deployment
        id: deploy
        run: |
          echo "🚀 Starting deployment at $(date)..."
          echo "deployment_started=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "✅ Repository: ${{ github.repository }}"
          echo "✅ Branch: ${{ github.ref_name }}"
          echo "✅ Commit: ${{ github.sha }}"

      - name: Pull Latest Code
        run: |
          echo "📦 Pulling latest code..."
          # git fetch + reset --hard is safe for existing repos
          # It updates tracked files without touching untracked ones
          git fetch origin main 2>&1 || {
            echo "❌ Git fetch failed"
            exit 1
          }
          git reset --hard origin/main 2>&1 || {
            echo "❌ Git reset failed"
            exit 1
          }
          echo "✅ Latest code pulled (commit: $(git log --oneline -1))"

      - name: Run Deploy Script
        id: deploy_script
        run: |
          echo "⚙️ Running deploy.sh (zero-downtime deployment)..."
          chmod +x backend/deploy.sh
          bash -x ./backend/deploy.sh 2>&1
          EXIT_CODE=$?

          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Deployment script failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

          echo "deployment_status=success" >> $GITHUB_OUTPUT
          echo "✅ Deployment script completed successfully"

      - name: Health Check
        id: health
        run: |
          echo "🔍 Running health check..."
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              https://api.lorndavid.online/api/health)

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed (attempt $i/5)"
              echo "health_status=passed" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "⏳ Waiting... health check attempt $i/5 returned $HTTP_CODE"
            sleep 5
          done

          echo "❌ Health check failed after 5 attempts"
          echo "health_status=failed" >> $GITHUB_OUTPUT
          echo "⚠️ Rolling back..."
          cd backend && ./deploy.sh --rollback || true
          exit 1

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Backend Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Runner | Self-hosted (on VM) |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Author | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY

  # ──── JOB: Deploy Frontends (Vercel) ──────────────────────
  deploy-frontends:
    name: Deploy Frontends to Vercel
    runs-on: ubuntu-latest
    needs: [deploy]
    if: success()

    steps:
      - name: Trigger Vercel User Frontend Deploy
        run: |
          echo "🚀 Triggering Vercel deploy for User Frontend..."
          curl -X POST "${{ secrets.VERCEL_USER_DEPLOY_HOOK }}"
          echo ""
          echo "✅ User frontend deploy triggered"

      - name: Trigger Vercel Admin Frontend Deploy
        run: |
          echo "🚀 Triggering Vercel deploy for Admin Frontend..."
          curl -X POST "${{ secrets.VERCEL_ADMIN_DEPLOY_HOOK }}"
          echo ""
          echo "✅ Admin frontend deploy triggered"

      - name: Frontend Deploy Summary
        run: |
          echo "## Frontend Deployments" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | Triggered |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| User     | ✅ Deploy hook sent |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin    | ✅ Deploy hook sent |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Vercel deployment progress: https://vercel.com/dashboard" >> $GITHUB_STEP_SUMMARY

  # ──── JOB: Telegram Notification ──────────────────────────
  notify:
    name: Send Telegram Notification
    runs-on: ubuntu-latest
    needs: [deploy, deploy-frontends]
    if: always()

    steps:
      - name: Send Telegram Message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ── *Bakong E-commerce — Deployment* ──

            *Repository:* ${{ github.repository }}
            *Branch:* ${{ github.ref_name }}
            *Commit:* `${{ github.sha }}`
            *Author:* ${{ github.actor }}
            *Time:* ${{ needs.deploy.outputs.deployment_started }}

            *Backend:* ${{ needs.deploy.result == 'success' && '✅ **Deployed**' || needs.deploy.result == 'failure' && '❌ **Failed**' || '⚠️ **Skipped**' }}
            *Frontends:* ${{ needs.deploy-frontends.result == 'success' && '✅ **Triggered**' || needs.deploy-frontends.result == 'failure' && '❌ **Failed**' || '⚠️ **Skipped**' }}

            ${{ needs.deploy.result == 'success' && '🔗 https://api.lorndavid.online/api/health' || '🔄 Rollback may have been triggered' }}
            ${{ needs.deploy-frontends.result == 'success' && '🔗 https://vercel.com/dashboard' || '' }}
