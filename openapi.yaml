openapi: 3.0.3
info:
  title: MY SHOP - Cambodian E-commerce API
  description: |
    A production-ready e-commerce API built for the Cambodian market.
    Integrates **Bakong KHQR** (National Bank of Cambodia QR payment) and **ABA PayWay**.
    Features real-time chat and notifications via Socket.IO (documented separately).

    ### Authentication
    - **User/Admin endpoints**: `Authorization: Bearer <accessToken>`
    - **Public endpoints**: No auth required
    - **Admin-only endpoints**: Require `admin` role
  version: 1.0.0
  contact:
    name: MY SHOP Development Team
    url: https://myshop.com
  license:
    name: Private
    url: https://myshop.com

servers:
  - url: http://localhost:5000/api
    description: Local development (Vite proxy)
  - url: https://api.myshop.com/api
    description: Production

tags:
  - name: Health
    description: API health check
  - name: Auth
    description: Authentication (Google OAuth, email login, token refresh)
  - name: Products
    description: Product listing, search, detail, flash sales
  - name: Categories
    description: Product category management
  - name: Orders
    description: Order creation, tracking, admin management
  - name: Payments
    description: Payment processing (KHQR, ABA PayWay), SSE streaming
  - name: Coupons
    description: Coupon system with validation, auto-apply, best-coupon
  - name: Promotions
    description: Promotion management with product assignment
  - name: Notifications
    description: User notifications and admin broadcast
  - name: Chat
    description: Live support chat (via REST + Socket.IO for real-time)
  - name: Users
    description: User management, admin dashboard stats
  - name: Inventory
    description: Warehouses, suppliers, stock movements, purchase orders
  - name: Hero Slides
    description: Homepage banner carousel management
  - name: Settings
    description: Site settings (singleton)

x-tagGroups:
  - name: Core Shopping
    tags:
      - Products
      - Categories
      - Orders
      - Payments
      - Coupons
      - Promotions
  - name: Account & Communication
    tags:
      - Auth
      - Notifications
      - Chat
  - name: Administration
    tags:
      - Users
      - Inventory
      - Hero Slides
      - Settings
  - name: System
    tags:
      - Health

security: []

paths:
  # ── Health ──────────────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: API health check
      operationId: healthCheck
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  # ── Auth ────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Admin login with email and password
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: admin@myshop.com
                password:
                  type: string
                  format: password
                  example: secret123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/google:
    post:
      tags: [Auth]
      summary: Login or register with Google OAuth
      operationId: authGoogle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [credential]
              properties:
                credential:
                  type: string
                  description: Google ID token from the OAuth flow
                  example: eyJhbGciOiJSUzI1NiIs...
      responses:
        '200':
          description: Google login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoogleLoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Duplicate account

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token using a refresh token
      operationId: authRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJSUzI1NiIs...
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  accessToken:
                    type: string
                  refreshToken:
                    type: string

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and record logout event
      operationId: authLogout
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  message:
                    type: string

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user profile
      operationId: authGetMe
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    $ref: '#/components/schemas/User'

  # ── Products ────────────────────────────────────────────────────
  /products:
    get:
      tags: [Products]
      summary: List products with search, filter, sort, and pagination
      operationId: getProducts
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Full-text search across name and description
        - name: category
          in: query
          schema:
            type: string
          description: Category ObjectId filter
        - name: minPrice
          in: query
          schema:
            type: number
            minimum: 0
          description: Minimum price filter
        - name: maxPrice
          in: query
          schema:
            type: number
            minimum: 0
          description: Maximum price filter
        - name: sort
          in: query
          schema:
            type: string
            enum: [price_asc, price_desc, newest, oldest, best_seller, discount]
          description: Sort order
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 12
            maximum: 100
      responses:
        '200':
          description: Paginated product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'

    post:
      tags: [Products]
      summary: Create a new product (admin only)
      operationId: createProduct
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, description, price, category]
              properties:
                name:
                  type: string
                description:
                  type: string
                price:
                  type: number
                stock:
                  type: integer
                  default: 0
                discount:
                  type: integer
                  default: 0
                category:
                  type: string
                  description: Category ObjectId
                featured:
                  type: boolean
                  default: false
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Up to 5 product images
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /products/featured:
    get:
      tags: [Products]
      summary: Get featured products
      operationId: getFeaturedProducts
      responses:
        '200':
          description: Featured products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'

  /products/flash-sale:
    get:
      tags: [Products]
      summary: Get flash sale products (discounted items)
      operationId: getFlashSaleProducts
      responses:
        '200':
          description: Flash sale products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'

  /products/new-arrivals:
    get:
      tags: [Products]
      summary: Get newest products
      operationId: getNewArrivals
      responses:
        '200':
          description: New arrivals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'

  /products/low-stock/overview:
    get:
      tags: [Products]
      summary: Get low stock products overview (admin)
      operationId: getLowStockProducts
      responses:
        '200':
          description: Low stock products
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'

  /products/{id}:
    get:
      tags: [Products]
      summary: Get single product detail
      operationId: getProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Product ObjectId
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Products]
      summary: Update a product (admin only)
      operationId: updateProduct
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                price:
                  type: number
                stock:
                  type: integer
                discount:
                  type: integer
                category:
                  type: string
                featured:
                  type: boolean
                images:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'

    delete:
      tags: [Products]
      summary: Delete a product (admin only)
      operationId: deleteProduct
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /products/{id}/related:
    get:
      tags: [Products]
      summary: Get related products for a given product
      operationId: getRelatedProducts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Related products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'

  # ── Categories ──────────────────────────────────────────────────
  /categories:
    get:
      tags: [Categories]
      summary: List all categories
      operationId: getCategories
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  categories:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'

    post:
      tags: [Categories]
      summary: Create a category (admin only)
      operationId: createCategory
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                icon:
                  type: string
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'

  /categories/{id}:
    get:
      tags: [Categories]
      summary: Get a single category
      operationId: getCategory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Category detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'

    put:
      tags: [Categories]
      summary: Update a category (admin only)
      operationId: updateCategory
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                icon:
                  type: string
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'

    delete:
      tags: [Categories]
      summary: Delete a category (admin only)
      operationId: deleteCategory
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Category deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /categories/{id}/products:
    get:
      tags: [Categories]
      summary: Get products by category
      operationId: getCategoryProducts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Products in category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'

  # ── Orders ──────────────────────────────────────────────────────
  /orders:
    post:
      tags: [Orders]
      summary: Create a new order
      operationId: createOrder
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'

    get:
      tags: [Orders]
      summary: List current user's orders
      operationId: getMyOrders
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User's orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Get order detail
      operationId: getOrder
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'

  /orders/{id}/cancel:
    put:
      tags: [Orders]
      summary: Cancel an order (user)
      operationId: cancelOrder
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'

  /orders/admin/all:
    get:
      tags: [Orders]
      summary: List all orders (admin)
      operationId: getAllOrders
      security:
        - BearerAuth: []
      responses:
        '200':
          description: All orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'

  /orders/admin/{id}/status:
    put:
      tags: [Orders]
      summary: Update order status (admin)
      operationId: updateOrderStatus
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [pending, confirmed, shipping, delivered, cancelled]
      responses:
        '200':
          description: Order status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'

  /orders/admin/{id}:
    delete:
      tags: [Orders]
      summary: Delete an order (admin)
      operationId: deleteOrder
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order deleted

  /orders/admin/bulk-delete:
    post:
      tags: [Orders]
      summary: Bulk delete orders (admin)
      operationId: bulkDeleteOrders
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Orders deleted

  # ── Payments ────────────────────────────────────────────────────
  /payment/create:
    post:
      tags: [Payments]
      summary: Create a payment (KHQR or ABA PayWay)
      operationId: createPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId, amount, provider]
              properties:
                orderId:
                  type: string
                amount:
                  type: number
                provider:
                  type: string
                  enum: [BAKONG, ABA_PAYWAY]
      responses:
        '200':
          description: Payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePaymentResponse'

  /payment/check:
    post:
      tags: [Payments]
      summary: Check payment status by provider
      operationId: checkPaymentStatus
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                md5:
                  type: string
                provider:
                  type: string
                  enum: [BAKONG, ABA_PAYWAY]
                tranId:
                  type: string
      responses:
        '200':
          description: Payment status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  status:
                    type: string
                    enum: [PENDING, PAID, FAILED, EXPIRED]

  /payment/status/{md5}:
    get:
      tags: [Payments]
      summary: Check Bakong payment status by MD5 hash
      operationId: checkPaymentStatusByMd5
      parameters:
        - name: md5
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment status

  /payment/subscribe/{md5}:
    get:
      tags: [Payments]
      summary: SSE endpoint for payment status push
      operationId: subscribePayment
      parameters:
        - name: md5
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /payment/subscribe/tran/{tranId}:
    get:
      tags: [Payments]
      summary: SSE endpoint by transaction ID
      operationId: subscribePaymentByTran
      parameters:
        - name: tranId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream

  /payment/save:
    post:
      tags: [Payments]
      summary: Save a transaction to the database
      operationId: saveTransaction
      responses:
        '200':
          description: Transaction saved

  /payment/webhook:
    post:
      tags: [Payments]
      summary: Webhook endpoint for payment providers
      operationId: handlePaymentWebhook
      responses:
        '200':
          description: Webhook received

  /payment/transactions:
    get:
      tags: [Payments]
      summary: List all transactions (admin)
      operationId: getAllTransactions
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Transaction list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  transactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transaction'

  /payment/transactions/{id}:
    delete:
      tags: [Payments]
      summary: Delete a transaction (admin)
      operationId: deleteTransaction
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction deleted

  /payment/stream:
    get:
      tags: [Payments]
      summary: SSE stream for live transaction monitoring (admin)
      operationId: paymentStream
      security:
        - BearerAuth: []
      parameters:
        - name: token
          in: query
          schema:
            type: string
          description: JWT token for EventSource compatibility
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  # ── Coupons ─────────────────────────────────────────────────────
  /coupons/available:
    get:
      tags: [Coupons]
      summary: List coupons available to the current user
      operationId: getUserCoupons
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Available coupons
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  coupons:
                    type: array
                    items:
                      $ref: '#/components/schemas/Coupon'

  /coupons/auto-apply:
    get:
      tags: [Coupons]
      summary: Get coupons eligible for auto-apply
      operationId: getAutoApplyCoupons
      responses:
        '200':
          description: Auto-apply coupons

  /coupons/highlighted:
    get:
      tags: [Coupons]
      summary: Get highlighted/promoted coupons for the coupon center
      operationId: getHighlightedCoupons
      responses:
        '200':
          description: Highlighted coupons
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  coupons:
                    type: array
                    items:
                      $ref: '#/components/schemas/Coupon'

  /coupons/code/{code}:
    get:
      tags: [Coupons]
      summary: Get a coupon by its code
      operationId: getCouponByCode
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          description: Coupon code (uppercase)
      responses:
        '200':
          description: Coupon found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CouponResponse'

  /coupons/validate:
    post:
      tags: [Coupons]
      summary: Validate a coupon code against a cart total
      operationId: validateCoupon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, cartTotal]
              properties:
                code:
                  type: string
                  example: WELCOME10
                cartTotal:
                  type: number
                  example: 50
      responses:
        '200':
          description: Coupon validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  valid:
                    type: boolean
                  coupon:
                    $ref: '#/components/schemas/Coupon'
                  discountAmount:
                    type: number

  /coupons/apply:
    post:
      tags: [Coupons]
      summary: Apply a coupon to the current user's cart
      operationId: applyCoupon
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
      responses:
        '200':
          description: Coupon applied

  /coupons/best-coupon:
    post:
      tags: [Coupons]
      summary: Find the best coupon for a given cart
      operationId: findBestCoupon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cartTotal]
              properties:
                cartTotal:
                  type: number
                  example: 85
                products:
                  type: array
                  items:
                    type: string
                  description: List of product ObjectIds
      responses:
        '200':
          description: Best coupon found
          content:
            application/json:
              schema:
                type: object
                properties:
