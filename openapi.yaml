                  type: string
      responses:
        '201':
          description: Purchase order created

  /inventory/purchase-orders/{id}:
    put:
      tags: [Inventory]
      summary: Update a purchase order (admin)
      operationId: updatePurchaseOrder
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Purchase order updated

  /inventory/purchase-orders/{id}/receive:
    post:
      tags: [Inventory]
      summary: Receive a purchase order, updating stock (admin)
      operationId: receivePurchaseOrder
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Purchase order received, stock updated

  # ── Hero Slides ─────────────────────────────────────────────────
  /hero-slides:
    get:
      tags: [Hero Slides]
      summary: Get active hero slides for the homepage
      operationId: getHeroSlides
      responses:
        '200':
          description: Active hero slides
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  slides:
                    type: array
                    items:
                      $ref: '#/components/schemas/HeroSlide'

    post:
      tags: [Hero Slides]
      summary: Create a hero slide (admin)
      operationId: createHeroSlide
      security:
        - BearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                title:
                  type: string
                subtitle:
                  type: string
                image:
                  type: string
                  format: binary
                link:
                  type: string
                isActive:
                  type: boolean
                order:
                  type: integer
      responses:
        '201':
          description: Hero slide created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeroSlideResponse'

  /hero-slides/all:
    get:
      tags: [Hero Slides]
      summary: Get all hero slides (admin)
      operationId: getAllHeroSlides
      security:
        - BearerAuth: []
      responses:
        '200':
          description: All hero slides

  /hero-slides/{id}:
    put:
      tags: [Hero Slides]
      summary: Update a hero slide (admin)
      operationId: updateHeroSlide
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                subtitle:
                  type: string
                image:
                  type: string
                  format: binary
                link:
                  type: string
                isActive:
                  type: boolean
                order:
                  type: integer
      responses:
        '200':
          description: Hero slide updated

    delete:
      tags: [Hero Slides]
      summary: Delete a hero slide (admin)
      operationId: deleteHeroSlide
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Hero slide deleted

  # ── Settings ────────────────────────────────────────────────────
  /settings:
    get:
      tags: [Settings]
      summary: Get site settings (public)
      operationId: getSettings
      responses:
        '200':
          description: Site settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingResponse'

    put:
      tags: [Settings]
      summary: Update site settings (admin)
      operationId: updateSettings
      security:
        - BearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                siteName:
                  type: string
                description:
                  type: string
                contactEmail:
                  type: string
                  format: email
                contactPhone:
                  type: string
                address:
                  type: string
                socialLinks[facebook]:
                  type: string
                socialLinks[instagram]:
                  type: string
                socialLinks[telegram]:
                  type: string
                logo:
                  type: string
                  format: binary
                favicon:
                  type: string
                  format: binary
                payment[bakongAccountId]:
                  type: string
                payment[merchantName]:
                  type: string
                payment[merchantCity]:
                  type: string
                payment[abaPaywayEnabled]:
                  type: boolean
                payment[abaPaywayMerchantId]:
                  type: string
                shipping[freeShippingThreshold]:
                  type: number
                shipping[shippingFee]:
                  type: number
                seo[metaTitle]:
                  type: string
                seo[metaDescription]:
                  type: string
      responses:
        '200':
          description: Settings updated

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT access token obtained from `/auth/login` or `/auth/google`.
        Include in the `Authorization` header: `Bearer <token>`.

  schemas:
    # ── Health ──
    HealthResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
          example: Bakong E-commerce API is running
        timestamp:
          type: string
          format: date-time

    # ── Common ──
    ApiError:
      type: object
      properties:
        success:
          type: boolean
          enum: [false]
        message:
          type: string
          example: Error description

    # ── Auth ──
    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        token:
          type: string
          description: JWT access token
        user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            email:
              type: string
            role:
              type: string
              enum: [user, admin]
            avatar:
              type: string
              nullable: true

    GoogleLoginResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          type: object
          properties:
            _id:
              type: string
            googleId:
              type: string
            name:
              type: string
            email:
              type: string
            avatar:
              type: string
              nullable: true

    # ── User ──
    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, admin]
        avatar:
          type: string
          nullable: true
        googleId:
          type: string
          nullable: true
        provider:
          type: string
          enum: [email, google]
        isVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserResponse:
      type: object
      properties:
        success:
          type: boolean
        user:
          $ref: '#/components/schemas/User'

    DashboardStats:
      type: object
      properties:
        totalUsers:
          type: integer
          example: 150
        totalOrders:
          type: integer
          example: 320
        totalRevenue:
          type: number
          example: 12500.0
        totalProducts:
          type: integer
          example: 85
        ordersByStatus:
          type: object
          properties:
            pending:
              type: integer
            confirmed:
              type: integer
            shipping:
              type: integer
            delivered:
              type: integer
            cancelled:
              type: integer
        revenueByDay:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              revenue:
                type: number

    # ── Product ──
    Product:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        stock:
          type: integer
        discount:
          type: integer
        images:
          type: array
          items:
            type: object
            properties:
              public_id:
                type: string
              secure_url:
                type: string
                format: uri
        category:
          type: string
          description: Category ObjectId
        rating:
          type: number
        numReviews:
          type: integer
        sold:
          type: integer
        featured:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductResponse:
      type: object
      properties:
        success:
          type: boolean
        product:
          $ref: '#/components/schemas/Product'

    ProductListResponse:
      type: object
      properties:
        success:
          type: boolean
        count:
          type: integer
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'

    # ── Category ──
    Category:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        icon:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CategoryResponse:
      type: object
      properties:
        success:
          type: boolean
        category:
          $ref: '#/components/schemas/Category'

    # ── Order ──
    CreateOrderRequest:
      type: object
      required:
        - products
        - shippingAddress
        - paymentMethod
      properties:
        products:
          type: array
          items:
            type: object
            required: [productId, quantity]
            properties:
              productId:
                type: string
              quantity:
                type: integer
                minimum: 1
        shippingAddress:
          type: object
          required: [fullName, phone]
          properties:
            fullName:
              type: string
            phone:
              type: string
        paymentMethod:
          type: string
          enum: [khqr, cod, aba_payway]
        couponCode:
          type: string
          description: Optional coupon code
          example: WELCOME10

    Order:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        products:
          type: array
          items:
            type: object
            properties:
              productId:
                type: string
              name:
                type: string
              image:
                type: string
              price:
                type: number
              quantity:
                type: integer
        subtotal:
          type: number
        shipping:
          type: number
        promotionDiscount:
          type: number
        total:
          type: number
        coupon:
          type: string
          nullable: true
        discountAmount:
          type: number
          nullable: true
        appliedPromotions:
          type: array
          items:
            type: object
            properties:
              promotionId:
                type: string
              name:
                type: string
              discountPercent:
                type: integer
        status:
          type: string
          enum: [pending, confirmed, shipping, delivered, cancelled]
        shippingAddress:
          type: object
          properties:
            fullName:
              type: string
            phone:
              type: string
        paymentMethod:
          type: string
          enum: [khqr, cod, aba_payway]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderResponse:
      type: object
      properties:
        success:
          type: boolean
        order:
          $ref: '#/components/schemas/Order'

    # ── Transaction ──
    Transaction:
      type: object
      properties:
        _id:
          type: string
        orderId:
          type: string
        amount:
          type: number
        provider:
          type: string
          enum: [BAKONG, ABA_PAYWAY]
        tranId:
          type: string
        md5:
          type: string
        qr:
          type: string
          description: Base64 QR image data URL
        status:
          type: string
          enum: [PENDING, PAID, FAILED, EXPIRED]
        expireAt:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ── Payment ──
    CreatePaymentResponse:
      type: object
      properties:
        success:
          type: boolean
        provider:
          type: string
          enum: [BAKONG, ABA_PAYWAY]
        qrString:
          type: string
          description: Base64 QR image data URL
        qrImage:
          type: string
          description: QR image data URL (Bakong)
        tranId:
          type: string
        md5:
          type: string
          description: Bakong MD5 hash
        expireInSec:
          type: integer
          example: 180
        clientId:
          type: string
          description: ABA PayWay client ID

    # ── Coupon ──
    Coupon:
      type: object
      properties:
        _id:
          type: string
        code:
          type: string
          description: Uppercase coupon code
        name:
          type: string
        description:
          type: string
        bannerImage:
          type: string
          format: uri
        discountType:
          type: string
          enum: [percentage, fixed, free_shipping]
        discountValue:
          type: number
        minOrderValue:
          type: number
        maxDiscount:
          type: number
        maxUses:
          type: integer
        currentUses:
          type: integer
        maxUsesPerUser:
          type: integer
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        isActive:
          type: boolean
        isHighlighted:
          type: boolean
        autoApply:
          type: boolean
        category:
          type: string
        applicableProducts:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    CouponResponse:
      type: object
      properties:
        success:
          type: boolean
        coupon:
          $ref: '#/components/schemas/Coupon'

    # ── Promotion ──
    Promotion:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        bannerImage:
          type: string
          format: uri
        discountPercent:
          type: integer
        products:
          type: array
          items:
            type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── Notification ──
    Notification:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
          description: User ObjectId (null for system)
        type:
          type: string
          enum:
            - order_confirmed
            - payment_successful
            - shipping_update
            - flash_sale
            - new_coupon
            - wishlist_price_drop
            - admin_broadcast
        title:
          type: string
        message:
          type: string
        data:
          type: object
        link:
          type: string
          nullable: true
        read:
          type: boolean
        readAt:
          type: string
          format: date-time
          nullable: true
        channels:
          type: array
          items:
            type: string
            enum: [in_app, email, push]
        scheduledFor:
          type: string
          format: date-time
          nullable: true
        sentAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── Chat ──
    Conversation:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        userName:
          type: string
        userEmail:
          type: string
        status:
          type: string
          enum: [waiting, active, closed]
        assignedTo:
          type: object
          nullable: true
          properties:
            adminId:
              type: string
            adminName:
              type: string
        lastMessage:
          type: string
        lastMessageAt:
          type: string
          format: date-time
        unreadCount:
          type: integer
        greeted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ConversationResponse:
      type: object
      properties:
        success:
          type: boolean
        conversation:
          $ref: '#/components/schemas/Conversation'

    ChatMessage:
      type: object
      properties:
        _id:
          type: string
        conversationId:
          type: string
        sender:
          type: string
          enum: [user, admin, system]
        senderId:
          type: string
        senderName:
          type: string
        content:
          type: string
        messageType:
          type: string
          enum: [text, file, system]
        fileUrl:
          type: string
          nullable: true
        fileName:
          type: string
          nullable: true
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

    MessageResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          $ref: '#/components/schemas/ChatMessage'

    # ── Hero Slide ──
    HeroSlide:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        subtitle:
          type: string
        image:
          type: string
          format: uri
        link:
          type: string
          nullable: true
        isActive:
          type: boolean
        order:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    HeroSlideResponse:
      type: object
      properties:
        success:
          type: boolean
        slide:
          $ref: '#/components/schemas/HeroSlide'

    # ── Settings ──
    Settings:
      type: object
      properties:
        _id:
          type: string
        siteName:
          type: string
        logo:
          type: string
          nullable: true
        favicon:
          type: string
          nullable: true
        description:
          type: string
        contactEmail:
          type: string
        contactPhone:
          type: string
        address:
          type: string
        socialLinks:
          type: object
          properties:
            facebook:
              type: string
            instagram:
              type: string
            telegram:
              type: string
        payment:
          type: object
          properties:
            bakongAccountId:
              type: string
            merchantName:
              type: string
            merchantCity:
              type: string
            abaPaywayEnabled:
              type: boolean
            abaPaywayMerchantId:
              type: string
        shipping:
          type: object
          properties:
            freeShippingThreshold:
              type: number
            shippingFee:
              type: number
        updatedAt:
          type: string
          format: date-time

    SettingResponse:
      type: object
      properties:
        success:
          type: boolean
        settings:
          $ref: '#/components/schemas/Settings'

    # ── Inventory ──
    Warehouse:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        location:
          type: string
        contactPerson:
          type: string
          nullable: true
        contactPhone:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WarehouseResponse:
      type: object
      properties:
        success:
          type: boolean
        warehouse:
          $ref: '#/components/schemas/Warehouse'

    Supplier:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        contactPerson:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SupplierResponse:
      type: object
      properties:
        success:
          type: boolean
        supplier:
          $ref: '#/components/schemas/Supplier'

  responses:
    BadRequest:
      description: Bad request — missing or invalid parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: Unauthorized — missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Forbidden:
      description: Forbidden — requires admin role
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
